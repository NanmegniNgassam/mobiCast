services:
  mobicast:
    build: .
    ports:
      - "8050:8050"
    volumes:
      - mobicast_data:/app/data
      - mobicast_db:/app/db
    environment:
      - SECRET_KEY=change-this-to-a-random-secret-key
      - DATABASE_PATH=/app/db/mobicast.db
      - DATA_DIR=/app/data
      - DEBUG=false
    restart: unless-stopped

volumes:
  mobicast_data:
  mobicast_db:
