services:
  mobicast:
    build: .
    ports:
      - "8050:8050"
    restart: unless-stopped
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_PATH=/app/db/mobicast.db
      - DATA_DIR=/app/data
    volumes:
      - ./data/defaults:/app/data/defaults:ro   # bind mount, read-only
      - mobicast_data:/app/data/analyses
      - mobicast_db:/app/db

volumes:
  mobicast_data:
  mobicast_db:
